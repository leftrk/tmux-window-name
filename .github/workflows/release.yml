name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Calculate SHA256
        id: sha
        run: |
          curl -sL https://github.com/leftrk/tmux-window-name/archive/refs/tags/${{ steps.version.outputs.VERSION }}.tar.gz -o release.tar.gz
          SHA256=$(sha256sum release.tar.gz | cut -d' ' -f1)
          echo "SHA256=$SHA256" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release.tar.gz

      - name: Print Formula update instructions
        run: |
          echo "Formula update needed in homebrew-tap repo:"
          echo "  url: https://github.com/leftrk/tmux-window-name/archive/refs/tags/${{ steps.version.outputs.VERSION }}.tar.gz"
          echo "  sha256: ${{ steps.sha.outputs.SHA256 }}"